<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<div class="navbar-custom d-flex justify-content-between align-items-center">
    <div class="text-white fw-bold fs-5">Parivahan</div>
    <div class="navbar-custom d-flex justify-content-between align-items-center">
    <div class="text-white fw-bold fs-5">Parivahan</div>

    <div>
        <a href="/">Home</a>
        <a href="/buses">Bus Details</a>
        <a href="/services">Services</a>
        <a href="/book">Book Bus</a>

        {% if session.get("user") %}
            <span style="color:white; margin-left:20px;">
                Welcome {{ session.get("user") }}
            </span>
            <a href="/logout" class="btn-auth ms-3">Logout</a>
        {% else %}
            <a href="/login" class="btn-auth ms-3">Login</a>
        {% endif %}
    </div>
</div>
</div>

<!-- LOGIN FORM -->
<div class="container" style="margin-top:120px; max-width:400px;">
    <h2 class="text-center mb-4">Login</h2>

    <form method="POST">
        <input class="form-control mb-3" type="email" name="email" placeholder="Enter Email" required>
        <input class="form-control mb-3" type="password" name="password" placeholder="Enter Password" required>
        <button class="btn btn-primary w-100" type="submit">Login</button>
    </form>

    {% if message %}
        <p class="text-danger text-center mt-3">{{ message }}</p>
    {% endif %}
</div>

</body>
</html>
