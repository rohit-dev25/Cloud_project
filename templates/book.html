<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Bus | Parivahan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

<!-- NAVBAR -->
<div class="navbar-custom d-flex justify-content-between align-items-center">
    <div class="text-white fw-bold fs-5">Parivahan</div>

    <div>
        <a href="/">Home</a>
        <a href="/buses">Bus Details</a>
        <a href="/services">Services</a>
        <a href="/book">Book Bus</a>

        {% if session.get("user") %}
            <span style="color:white; margin-left:20px;">
                Welcome {{ session.get("user") }}
            </span>
            <a href="/logout" class="btn-auth ms-3">Logout</a>
        {% else %}
            <a href="/login" class="btn-auth ms-3">Login</a>
        {% endif %}
    </div>
</div>

<!-- CONTENT -->
<div class="page-content">

    <div class="container">
        <div class="card shadow p-4 mx-auto" style="max-width:500px;">
            <h3 class="text-center mb-4">Book Your Bus</h3>

            <form method="POST" action="/book">

                <label>User Name</label>
                <input type="text" name="user_name" class="form-control mb-3" required>

                <label>Bus Name</label>
                <input type="text" name="bus_name" class="form-control mb-3" required
                       value="{{ request.args.get('bus_name', '') }}" readonly>

                <label>Route</label>
                <input type="text" name="route" class="form-control mb-3" required
                       value="{{ request.args.get('route', '') }}" readonly>

                <label>Time</label>
                <input type="text" name="time" class="form-control mb-3" required
                       value="{{ request.args.get('time', '') }}" readonly>

                <label>Seat Number (1-40)</label>
                <input type="text" name="seat_no" class="form-control mb-3" min="1" max="40" required>

                <label>Journey Date:</label>
                <input type="date" name="journey_date" class="form-control mb-3" required>
                           
                <button type="submit" class="btn btn-success w-100">
                    Confirm Booking
                </button>

            </form>
        </div>
    </div>

</div>

</body>
</html>
