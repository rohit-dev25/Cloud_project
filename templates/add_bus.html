<!DOCTYPE html>
<html>
<head>
    <title>Add Bus</title>
</head>
<body>
    <h2>Add Bus</h2>

    <form method="POST">
        <input type="text" name="bus_name" placeholder="Bus Name" required><br><br>
        <input type="text" name="route" placeholder="Route" required><br><br>
        <input type="text" name="time" placeholder="Time" required><br><br>
        <input type="number" name="seats" placeholder="Seats" required><br><br>
        <button type="submit">Add Bus</button>
    </form>

</body>
</html>
